apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: barber-shop
type: Opaque
stringData:
  MYSQL_DATABASE: barber_shop_db
  MYSQL_ROOT_PASSWORD: root   # using root/root as you specified — fine for a lab, not for anything beyond it
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: barber-shop
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None   # headless, stable DNS name for the StatefulSet pod
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: barber-shop
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-credentials
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$(MYSQL_ROOT_PASSWORD)"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
