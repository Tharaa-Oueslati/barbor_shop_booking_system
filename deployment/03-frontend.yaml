apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: barber-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: frontend
          image: 192.168.100.20/barber-shop/frontend:latest   # <-- set your real tag
          ports:
            - containerPort: 80
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: barber-shop
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
