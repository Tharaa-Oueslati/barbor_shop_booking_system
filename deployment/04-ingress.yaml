apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: barber-shop
  namespace: barber-shop
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: barber-shop.local
      http:
        paths:
          # anything under /api/* goes to the backend, with /api stripped off
          # e.g. barber-shop.local/api/customers -> backend service /customers
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 8080
          # everything else goes to the Angular app
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
