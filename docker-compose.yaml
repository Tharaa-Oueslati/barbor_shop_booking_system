services:
  backend:
    build:
      context: ./backend
    container_name: barber-backend
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/barber_booking
      SPRING_DATASOURCE_USERNAME: barber
      SPRING_DATASOURCE_PASSWORD: barber123
    depends_on:
      mysql:
        condition: service_healthy   # ← wait until MySQL is actually ready

  frontend:
    build:
      context: ./frontend
      args:
        API_URL: "http://localhost:8085/api"
    container_name: barber-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

  mysql:
    image: mysql:8.4
    container_name: barber-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: barber_booking
      MYSQL_USER: barber
      MYSQL_PASSWORD: barber123
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:                                          # ← add this
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "barber", "-pbarber123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
