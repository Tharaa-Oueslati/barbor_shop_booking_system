server {
    listen 80;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Angular SPA routing — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API calls to the backend container.
    # "backend" resolves via Docker's internal DNS because both containers
    # share the same docker-compose network.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
